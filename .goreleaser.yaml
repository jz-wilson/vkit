# GoReleaser v2 config. Docs: https://goreleaser.com
# Validate locally with: goreleaser check
version: 2

project_name: vkit

before:
  hooks:
    - go mod tidy

builds:
  - id: vkit
    main: .
    binary: vkit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # NOTE: main.version does not exist in the source yet, so this -X is a no-op
    # until a `var version = "dev"` is added to package main. See follow-ups.
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: vkit
    ids:
      - vkit
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    # Windows users expect a .zip.
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
